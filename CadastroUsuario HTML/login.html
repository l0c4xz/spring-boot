<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="CSS/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        /* Estilos específicos para o Modal funcionar com o seu CSS */
        #modalRecuperacao {
            display: none; /* Escondido por padrão */
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .forgot-link {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #38bdf8;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .forgot-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <a href="index.html">
        <button class="btn-pagina">Cadastrar-se</button>
    </a>

    <div class="loading-content">
        <h1 class="logo-sistema">LOGIN</h1>
        <div class="progress-bar">
            <div class="progress"></div>
        </div>
    </div>

    <div class="container">
        <form id="calcForm">
            <div class="input-icon">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="mail" name="mail" placeholder="Email" required/>
            </div>
            
            <div class="input-icon">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="senha" name="senha" placeholder="Senha" required/>
            </div>

            <button type="submit">Entrar</button>
            
            <a class="forgot-link" onclick="abrirModal()">Esqueceu sua senha?</a>
        </form>
    </div>

    <div id="modalRecuperacao">
        <div class="container" style="max-width: 450px; margin: 0;">
            <h2>Recuperar Senha</h2>
            <p style="text-align: center; margin-bottom: 20px; font-size: 14px; opacity: 0.8;">
                Enviaremos um link de redefinição para o seu e-mail.
            </p>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div class="input-icon">
                    <i class="fa-solid fa-paper-plane"></i>
                    <input type="email" id="emailRecuperar" placeholder="Seu e-mail cadastrado">
                </div>
                
                <button type="button" onclick="enviarEmailRecuperacao()">Enviar Link</button>
                <button type="button" class="btn-cancelar" onclick="fecharModal()">Voltar</button>
            </div>
            
            <div id="statusRecuperacao" style="margin-top: 15px; text-align: center; font-weight: bold; font-size: 14px;"></div>
        </div>
    </div>

    <script src="Js/login.js"></script>

    <script>
        function abrirModal() {
            document.getElementById("modalRecuperacao").style.display = "flex";
        }

        function fecharModal() {
            document.getElementById("modalRecuperacao").style.display = "none";
            document.getElementById("statusRecuperacao").textContent = "";
        }

        // Fecha o modal se o usuário clicar fora da caixa
        window.onclick = function(event) {
            const modal = document.getElementById("modalRecuperacao");
            if (event.target == modal) fecharModal();
        }

    function enviarEmailRecuperacao() {
    const emailInput = document.getElementById("emailRecuperar").value;
    const status = document.getElementById("statusRecuperacao");

    if (!emailInput) {
        status.style.color = "#ef4444";
        status.textContent = "Digite um e-mail válido.";
        return;
    }

    status.style.color = "#38bdf8";
    status.textContent = "Processando...";

    // encodeURIComponent trata o @ e o ponto para o Java entender
    const emailCodificado = encodeURIComponent(emailInput);
    const url = `http://localhost:8080/usuarios/solicitar-recuperacao?email=${emailCodificado}`;

    fetch(url, { method: "POST" })
    .then(response => {
        if (response.ok) {
            status.style.color = "#22c55e";
            status.textContent = "E-mail enviado! Verifique sua caixa.";
        } else {
            status.style.color = "#ef4444";
            status.textContent = "E-mail não encontrado no sistema.";
        }
    })
    .catch(() => {
        status.style.color = "#ef4444";
        status.textContent = "Erro ao conectar com o servidor.";
    });
}
    </script>
</body>
</html>
